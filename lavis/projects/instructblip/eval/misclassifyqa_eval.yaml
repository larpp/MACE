model:
  arch: blip2_vicuna_instruct_qformer_llm_lora
  model_type: vicuna7b
  load_pretrained: True # pretrain from scratch
  pretrained: "https://storage.googleapis.com/sfr-vision-language-research/LAVIS/models/InstructBLIP/instruct_blip_vicuna7b_trimmed.pth"
  freeze_vit: True
  # LLM PEFT parameters
  llm_lora_r: 8
  llm_lora_apply: all
  # qformer PEFT parameters
  lora_r: 8
  lora_alpha: 8
  lora_dropout: 0
  self_attention_qv_lora: True
  self_attention_output_lora: False
  ffn_lora: True
  qformer_crossattention_lora_q: True
  qformer_crossattention_lora_k: True
  qformer_crossattention_lora_v: True
  qformer_crossattention_lora_o: True

  # prompt - Eval
  # checkpoint load - required gradient false인 것 까지 다 저장하니까 잘 됨
  load_finetuned: True
  finetuned: "/home/InstructBLIP_PEFT/output/results/misclassifyqa/misclassifyqa_64/epoch15_gpt_instruction/checkpoint_14.pth"

  # CoCoOp
  # TRAINER:
  #   COCOOP:
  #     N_CTX: 32
  #     CTX_INIT: ""
  #     PREC: "fp16"
  #     batch_size_train: 16

datasets:
  misclassifyqa:
    train_samples_portion: all
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
      eval:
        name: "blip_image_eval"
        image_size: 224
    text_processor:
      train:
        name: "instruct_blip_question"
      eval:
        name: "instruct_blip_question"

run:
  task: misclassifyqa
  # optimizer
  lr_sched: "linear_decay_lr"
  init_lr: 1e-4 # 5e-4
  min_lr: 0
  warmup_lr: 1e-4 # 5e-4
  warmup_steps: 0

  weight_decay: 0.05
  batch_size_train: 8
  accum_grad_iters: 2 # 2
  batch_size_eval: 4
  num_workers: 4

  # inference-specific
  inference_method: "generate" # "rank"

  max_len: 20
  min_len: 1 
  num_beams: 7
  num_captions: 7
  do_smaple: True

  seed: 42
  output_dir: "/home/InstructBLIP_PEFT/output/results/misclassifyqa/misclassifyqa_64"

  amp: True
  resume_ckpt_path: null

  evaluate: True # False
  test_splits: ["test"]

  device: "cuda"
  # world_size: 1
  # dist_url: "env://"
  # distributed: True
